version: "3.8"

services:
  phoenix:
    image: arizephoenix/phoenix:latest
    container_name: cs599-phoenix
    ports:
      - "6006:6006"
    environment:
      - PHOENIX_PORT=6006

  prometheus:
    image: prom/prometheus:latest
    container_name: cs599-prometheus
    ports:
      - "19090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=1h'

  grafana:
    image: grafana/grafana:latest
    container_name: cs599-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - ./grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./grafana-dashboard.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./cs599-dashboard.json:/var/lib/grafana/dashboards/cs599-dashboard.json:ro
